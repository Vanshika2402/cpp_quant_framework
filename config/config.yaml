project:
  name: "Japan Live Derivatives Pricing and Risk Framework"
  data_dir: "data"
  output_dir: "outputs"
  plot_dir: "outputs/plots"

market:
  start_date: "2024-01-01"
  trading_days: 252
  risk_free_rate: 0.0100
  mispricing_threshold: 0.05

monte_carlo:
  paths: 10000
  steps: 252
  seed: 42

data:
  option_chain_csv: "data/option_chain_japan.csv"
  quote_source: "YFINANCE"

execution:
  execute_orders: false
  trade_mode: "PAPER"
  max_orders_per_run: 1
  order_quantity: 1

ibkr:
  host: "127.0.0.1"
  port: 7497
  client_id: 24
  account: ""

instruments:
  - id: "SOFTBANK"
    name: "SoftBank Group Corp."
    symbol: "9984"
    asset_type: "equity"
    yahoo: "9984.T"
    tradingview: "TSE:9984"
    option_type: "CALL"
    dividend_yield: 0.0000

  - id: "TOKYO_ELECTRON"
    name: "Tokyo Electron Ltd."
